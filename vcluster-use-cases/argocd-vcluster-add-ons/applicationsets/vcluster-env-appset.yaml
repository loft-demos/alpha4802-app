apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: vcluster-env-config
  namespace: argocd
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - clusters:
        selector:
          matchLabels:
            env: dev
    - clusters:
        selector:
          matchLabels:
            env: qa
    - clusters:
        selector:
          matchLabels:
            env: prod
  template:
    metadata:
      name: alpha4802-app-{{.name}}
    spec:
      destination:
        namespace: alpha4802-app-{{.metadata.labels.env}}
        server: '{{.server}}'
      info:
        - name: Git Repo
          value: 'https://github.com/loft-demos/alpha4802-app/'
      project: 'loft-{{ index .metadata.labels "use-case.demos.vcluster.com/project" }}'
      source:
        path: vcluster-use-cases/argocd-vcluster-add-ons/manifests/{{.metadata.labels.env}}/
        repoURL: 'https://github.com/loft-demos/alpha4802-app.git'
        targetRevision: main
      syncPolicy:
        automated:
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
